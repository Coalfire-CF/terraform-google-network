name: Dependabot Auto-Merge
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
jobs:
  auto-merge:
    # Trust boundary (pull_request_target + secrets: inherit): the caller-level
    # actor gate keeps secrets out of the path for fork/attacker PRs.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    uses: Coalfire-CF/Actions/.github/workflows/org-dependabot-auto-merge.yml@33a5e8e2f7fe782ea151eb2bd8c653b5d2778a68 # v0.12.0
    secrets: inherit
