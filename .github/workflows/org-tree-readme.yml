name: Update README Tree on PR

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  readme-tree:
    uses: Coalfire-CF/Actions/.github/workflows/org-tree-readme.yml@0324cf8a90b4b9c523465f53a892a722f613e318 # v0.15.0
    with:
      commit_message: "chore: update README tree"
      exclude_pattern: ".git|node_modules|.github|dist|build"
      working_directory: "."
