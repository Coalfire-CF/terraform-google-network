name: Org Terraform Validate

permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
      - "**.hcl"
      - ".terraform.lock.hcl"
      - "**/terraform/**"

jobs:
  terraform-validate:
    uses: Coalfire-CF/Actions/.github/workflows/org-terraform-validate.yml@df5fe1a0ee9068473c763609fc1d20c66df6ef94 # v0.14.0
    with:
      terraform_version: "1.15.7"
