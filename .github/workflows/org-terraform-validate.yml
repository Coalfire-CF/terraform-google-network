name: Org Terraform Validate

permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
      - "**.hcl"
      - ".terraform.lock.hcl"
      - "**/terraform/**"

jobs:
  terraform-validate:
    uses: Coalfire-CF/Actions/.github/workflows/org-terraform-validate.yml@33a5e8e2f7fe782ea151eb2bd8c653b5d2778a68 # v0.12.0
    with:
      terraform_version: "1.15.7"
